version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: online_cinema_db
    environment:
      POSTGRES_USER: cinema_user
      POSTGRES_PASSWORD: cinema_password
      POSTGRES_DB: cinema_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build: .
    container_name: online_cinema_app
    command: sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    ports:
      - "8002:8000"
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
  worker:
    build: .
    container_name: online_cinema_worker
    command: celery -A src.tasks:celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - db


  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_container
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  redis:
    image: redis:7-alpine
    container_name: online_cinema_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data: